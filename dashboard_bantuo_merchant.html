var curLang = 'zh';

var i18n = {
  zh: {
    title: '香水稀缺爆款推荐 · US半托管',
    subtitle: 'Amazon热销竞品推荐 · 高潜单品机会',
    footer: '香水稀缺爆款推荐 · US半托管',
    brand_dim: '品牌维度：稀缺爆款品牌推荐',
    item_dim: '单品维度：Amazon 热销爆款推荐清单',
    rank: '排名', brand: '品牌',     product_title: '商品标题', spec: '规格',
    amz_monthly_sales: 'Amazon 月销', amz_monthly_rev: 'Amazon 销额',
    price: '价格', image: '图片'
  },
  en: {
    title: 'Scarce Hot Product Recommendations · US Semi-Managed',
    subtitle: 'Amazon Hot Competitor Recommendations · High-Potential Opportunities',
    footer: 'Scarce Hot Product Recommendations · US Semi-Managed',
    brand_dim: 'Brand Level: Scarce Hot Brand Recommendations',
    item_dim: 'Item Level: Amazon Hot Product Recommendations',
    rank: 'Rank', brand: 'Brand',     product_title: 'Product Title', spec: 'Spec',
    amz_monthly_sales: 'Amazon Monthly Sales', amz_monthly_rev: 'Amazon Monthly Rev',
    price: 'Price', image: 'Image'
  }
};

function t(key) { return i18n[curLang][key] || key; }

function switchLang(lang) {
  curLang = lang;
  document.querySelectorAll('.lt-btn').forEach(function(b){b.classList.remove('on')});
  event.target.classList.add('on');
  document.getElementById('title').textContent = t('title');
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('footer').textContent = t('footer');
  render();
}

function escHtml(str) {
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  var gap = DATA.GAP;
  var notIntro = gap.not_intro;
  var container = document.getElementById('content');
  var html = '';

  // KPI cards
  var totalCount = notIntro.length;
  html += '<div class="kr">';
  html += '<div class="kc"><div class="kl">'+(curLang==='zh'?'推荐品牌数':'Recommended Brands')+'</div><div class="kv">'+Object.keys(notIntro.reduce(function(m,item){m[item.bn]=1;return m},{})).length+'</div></div>';
  html += '<div class="kc"><div class="kl">'+(curLang==='zh'?'推荐单品数':'Recommended Items')+'</div><div class="kv">'+totalCount+'</div></div>';
  html += '</div>';

  // Brand dimension table
  var brandMap = {};
  notIntro.forEach(function(item){
    if(!brandMap[item.bn]) brandMap[item.bn]={count:0,tier:item.t};
    brandMap[item.bn].count++;
  });
  var gapBrands = [];
  for(var bn in brandMap){ gapBrands.push({bn:bn, count:brandMap[bn].count, tier:brandMap[bn].tier}); }
  gapBrands.sort(function(a,b){return b.count-a.count});

  html += '<div class="card"><h3>'+t('brand_dim')+'</h3>';
  html += '<div class="tw"><table><thead><tr>';
  html += '<th>'+t('rank')+'</th><th>'+t('brand')+'</th><th class="r">'+(curLang==='zh'?'推荐单品数':'Recommended Items')+'</th>';
  html += '</tr></thead><tbody>';

  gapBrands.forEach(function(b,i){
    html += '<tr>';
    html += '<td>'+(i+1)+'</td>';
    html += '<td><strong>'+escHtml(b.bn)+'</strong></td>';
    
    html += '<td class="r">'+b.count+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  // Item dimension table
  html += '<div class="card"><h3>'+t('item_dim')+'（'+totalCount+'）</h3>';
  html += '<div class="tw"><table><thead><tr>';
  html += '<th>'+t('brand')+'</th><th>'+t('product_title')+'</th><th>'+t('spec')+'</th><th class="r">'+t('amz_monthly_sales')+'</th><th class="r">'+t('amz_monthly_rev')+'</th><th class="r">'+t('price')+'</th><th>'+t('image')+'</th>';
  html += '</tr></thead><tbody>';

  var topItems = notIntro.slice().sort(function(a,b){return (b.ms||0)-(a.ms||0)}).slice(0,100);
  topItems.forEach(function(item){
    html += '<tr>';
    html += '<td><strong>'+escHtml(item.bn)+'</strong></td>';
    
    html += '<td style="max-width:350px;overflow:hidden;text-overflow:ellipsis" title="'+escHtml(item.title)+'">';
    if(item.asin){
      html += '<a href="https://www.amazon.com/dp/'+escHtml(item.asin)+'" target="_blank" style="color:#667eea;text-decoration:none">'+escHtml(item.title||'-')+' ↗</a>';
    }else{
      html += escHtml(item.title||'-');
    }
    html += '</td>';
    html += '<td>'+(item.spec||'-')+'</td>';
    html += '<td class="r">'+(item.mq?item.mq.toFixed(0):'-')+'</td>';
    html += '<td class="r">$'+(item.ms?(item.ms/1e3).toFixed(1)+'K':'-')+'</td>';
    html += '<td class="r">'+(item.dp?'$'+item.dp.toFixed(2):'-')+'</td>';
    html += '<td>';
    if(item.asin){
      html += '<div style="display:flex;align-items:center;gap:4px">';
      html += '<img src="'+escHtml(item.img)+'" style="width:50px;height:50px;object-fit:cover;border-radius:4px;border:1px solid #e2e8f0" alt="" onerror="this.style.display=\'none\'">';
      html += '<a href="https://www.amazon.com/dp/'+escHtml(item.asin)+'" target="_blank" style="color:#667eea;font-size:10px;text-decoration:none;white-space:nowrap">ASIN↗</a>';
      html += '</div>';
    }else{
      html += '<img src="'+escHtml(item.img)+'" class="product-img" alt="">';
    }
    html += '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  container.innerHTML = html;
}

render();
</script>
