var curMarket = 'US';
var curLang = 'zh';

var i18n = {
  zh: {

    EU_title: '香水稀缺爆款推荐 · EU半托管',

    brand_dim: '品牌维度：稀缺爆款品牌推荐',

    rank: '排名', brand: '品牌', product_title: '商品标题', spec: '规格',
    amz_monthly_sales: 'Amazon 月销', amz_monthly_rev: 'Amazon 销额',
    price: '价格', image: '图片',
    rec_brands: '推荐品牌数', rec_items: '推荐单品数'
  },
  en: {
    US_title: 'Scarce Hot Products · US Semi-Managed',
    EU_title: 'Scarce Hot Products · EU Semi-Managed',
    subtitle: 'Amazon Hot Competitor Recommendations · High-Potential Opportunities',
    brand_dim: 'Brand Level: Scarce Hot Brand Recommendations',
    item_dim: 'Item Level: Amazon Hot Product Recommendations',
    rank: 'Rank', brand: 'Brand', product_title: 'Product Title', spec: 'Spec',
    amz_monthly_sales: 'Amazon Monthly Sales', amz_monthly_rev: 'Amazon Monthly Rev',
    price: 'Price', image: 'Image',
    rec_brands: 'Recommended Brands', rec_items: 'Recommended Items'
  }
};

var amzDomain = {US: 'amazon.com', EU: 'amazon.it'};
var currency = {US: '$', EU: '€'};

function t(key) { return i18n[curLang][key] || key; }

function switchMarket(market, el) {
  curMarket = market;
  document.querySelectorAll('.market-tab').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  document.getElementById('title').textContent = t(market+'_title');
  render();
}

function switchLang(lang, el) {
  curLang = lang;
  document.querySelectorAll('.lt-btn').forEach(function(b){b.classList.remove('on')});
  el.classList.add('on');
  document.getElementById('title').textContent = t(curMarket+'_title');
  document.getElementById('subtitle').textContent = t('subtitle');
  render();
}

function escHtml(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  var gap = DATA[curMarket];
  var items = gap.not_intro;
  var el = document.getElementById('content');
  var h = '';
  var cur = currency[curMarket];
  var domain = amzDomain[curMarket];
  var total = items.length;
  var brands = Object.keys(items.reduce(function(m,i){m[i.bn]=1;return m},{})).length;

  h += '<div class="kr">';
  h += '<div class="kc"><div class="kl">'+t('rec_brands')+'</div><div class="kv">'+brands+'</div></div>';
  h += '<div class="kc"><div class="kl">'+t('rec_items')+'</div><div class="kv">'+total+'</div></div>';
  h += '</div>';

  var bm = {};
  items.forEach(function(i){if(!bm[i.bn])bm[i.bn]={c:0};bm[i.bn].c++});
  var gb = [];
  for(var b in bm) gb.push({bn:b, c:bm[b].c});
  gb.sort(function(a,b){return b.c-a.c});

  h += '<div class="card"><h3>'+t('brand_dim')+'</h3><div class="tw"><table><thead><tr>';
  h += '<th>'+t('rank')+'</th><th>'+t('brand')+'</th><th class="r">'+t('rec_items')+'</th>';
  h += '</tr></thead><tbody>';
  gb.forEach(function(b,i){
    h += '<tr><td>'+(i+1)+'</td><td><strong>'+escHtml(b.bn)+'</strong></td><td class="r">'+b.c+'</td></tr>';
  });
  h += '</tbody></table></div></div>';

  h += '<div class="card"><h3>'+t('item_dim')+'（'+total+'）</h3><div class="tw"><table><thead><tr>';
  h += '<th>'+t('brand')+'</th><th>'+t('product_title')+'</th><th>'+t('spec')+'</th><th class="r">'+t('amz_monthly_sales')+'</th><th class="r">'+t('amz_monthly_rev')+'</th><th class="r">'+t('price')+'</th><th>'+t('image')+'</th>';
  h += '</tr></thead><tbody>';

  items.slice().sort(function(a,b){return (b.ms||0)-(a.ms||0)}).forEach(function(item){
    h += '<tr>';
    h += '<td><strong>'+escHtml(item.bn)+'</strong></td>';
    h += '<td style="max-width:350px;overflow:hidden;text-overflow:ellipsis" title="'+escHtml(item.title)+'">';
    if(item.asin) h += '<a href="https://www.'+domain+'/dp/'+escHtml(item.asin)+'" target="_blank" style="color:#667eea;text-decoration:none">'+escHtml(item.title||'-')+' ↗</a>';
    else h += escHtml(item.title||'-');
    h += '</td>';
    h += '<td>'+(item.spec||'-')+'</td>';
    h += '<td class="r">'+(item.mq?item.mq.toFixed(0):'-')+'</td>';
    h += '<td class="r">'+cur+(item.ms?(item.ms/1e3).toFixed(1)+'K':'-')+'</td>';
    h += '<td class="r">'+(item.dp?cur+item.dp.toFixed(2):'-')+'</td>';
    h += '<td>';
    if(item.asin){
      h += '<div style="display:flex;align-items:center;gap:4px">';
      h += '<img src="'+escHtml(item.img)+'" style="width:50px;height:50px;object-fit:cover;border-radius:4px;border:1px solid #e2e8f0" onerror="this.style.display=\'none\'">';
      h += '<a href="https://www.'+domain+'/dp/'+escHtml(item.asin)+'" target="_blank" style="color:#667eea;font-size:10px;text-decoration:none;white-space:nowrap">ASIN↗</a>';
      h += '</div>';
    }else{
      h += '<img src="'+escHtml(item.img)+'" class="product-img">';
    }
    h += '</td></tr>';
  });
  h += '</tbody></table></div></div>';
  el.innerHTML = h;
}

render();
</script>
